<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="arc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Three arcs converging on a center node — agents connecting through one point -->
  <path d="M 96 400 Q 96 256 256 256" stroke="url(#arc)" stroke-width="28" fill="none" stroke-linecap="round"/>
  <path d="M 256 80 Q 256 256 256 256" stroke="url(#arc)" stroke-width="28" fill="none" stroke-linecap="round"/>
  <path d="M 416 400 Q 416 256 256 256" stroke="url(#arc)" stroke-width="28" fill="none" stroke-linecap="round"/>
  <!-- Endpoints — the agents -->
  <circle cx="96" cy="400" r="24" fill="#818cf8"/>
  <circle cx="256" cy="80" r="24" fill="#818cf8"/>
  <circle cx="416" cy="400" r="24" fill="#818cf8"/>
  <!-- Center hub — Meridian -->
  <circle cx="256" cy="256" r="36" fill="url(#arc)"/>
</svg>
